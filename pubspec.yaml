name: le_movie
description: A premium movie streaming website built with Flutter.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  provider: ^6.1.1
  video_player: ^2.8.2
  chewie: ^1.8.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  webview_flutter: ^4.10.0
  webview_windows: ^0.4.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  web:
    generate: true
    image_path: "assets/logo/logo.png"
    background_color: "#0F0F0F"
    theme_color: "#E50914"
  windows:
    generate: true
    image_path: "assets/logo/logo.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

