<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Watch high-end trending movies and TV shows for free. Premium streaming experience with no ads.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LE MOVIE">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LE MOVIE | Premium Streaming</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Global Popup & Redirect Blocker
    (function() {
      // 1. Block window.open (Popups) - Aggressive Version
      const originalOpen = window.open;
      window.open = function(url, name, specs) {
        console.warn('GLOBAL POPUP BLOCKED:', url);
        return { 
          closed: true, 
          focus: function() {}, 
          close: function() {},
          blur: function() {} 
        }; // Return a dummy object to satisfy scripts
      };

      // 2. Prevent Top-level Redirection from Iframes
      // We monitor for any attempt to change top-level location
      window.addEventListener('beforeunload', function(e) {
        // Unfortunately, modern browsers require a user interaction 
        // to show a confirmation, but we can log it.
        console.warn('Potential redirect detected');
      });

      // 3. Click Interception (Global)
      // This catches any links that might be dynamically created
      document.addEventListener('click', function(e) {
        let target = e.target;
        while (target && target.tagName !== 'A') target = target.parentNode;
        if (target && target.tagName === 'A') {
          if (target.target === '_blank' || target.href.includes('ad') || target.href.includes('track')) {
            console.log('Blocking suspicious link:', target.href);
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
        }
      }, true);

      // 5. Lockdown Mode: Monitor window focus
      // If an ad tries to open a popup, the window will lose focus.
      // We try to prevent the browser from allowing the popup to steal focus.
      window.addEventListener('blur', function() {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
          console.warn('AD ATTEMPT DETECTED: Focusing back...');
          window.focus();
        }
      });

      // 6. Block Top-Level Navigation specifically from Iframes
      // This is a last-resort hack for non-sandboxed iframes
      window.onbeforeunload = function() {
        // If we are on the player page, we try to stay there
        if (window.location.hash.includes('player') || window.location.href.includes('player')) {
           return "LE-MOVIE: A redirect was blocked. Stay here to continue watching.";
        }
      };

      // 4. Block common ad-script behaviors
      window.alert = function() { return true; };
      window.confirm = function() { return true; };
      window.prompt = function() { return null; };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
