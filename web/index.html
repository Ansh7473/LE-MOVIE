<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Watch high-end trending movies and TV shows for free. Premium streaming experience with no ads.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LE MOVIE">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LE MOVIE | Premium Streaming</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Global Popup & Redirect Blocker
    (function() {
      // 1. Block window.open (Popups)
      const originalOpen = window.open;
      window.open = function(url, name, specs) {
        console.warn('GLOBAL POPUP BLOCKED:', url);
        // If the user meant "redirect tab should open" in a specific way, 
        // we could handle it here, but they said "no popu windows".
        return null; 
      };

      // 2. Prevent Top-level Redirection from Iframes
      // This trick helps prevent iframes from changing window.top.location
      let lastLocation = window.location.href;
      window.onbeforeunload = function(e) {
        // If the location is changing but it's not a user-initiated navigation 
        // (within the Flutter app), we try to block it.
        // Note: Modern browsers have strict limits on what this can do.
      };

      // 3. Block common ad-script behaviors
      window.alert = function() { return true; };
      window.confirm = function() { return true; };
      window.prompt = function() { return null; };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
