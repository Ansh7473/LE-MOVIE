name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build & Release APK

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION+$BUILD" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "LE MOVIE ${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build }})"
          body: |
            ## LE MOVIE - Android Release

            **Version**: ${{ steps.version.outputs.version }}
            **Build**: ${{ steps.version.outputs.build }}

            ### Download
            - `app-arm64-v8a-release.apk` — Modern phones (ARM64, recommended)
            - `app-armeabi-v7a-release.apk` — Older phones (ARM32)
            - `app-x86_64-release.apk` — Emulators / x86 devices

            ### What's Included
            - 🎬 10+ streaming servers with auto-fallback
            - 🔍 Smart search across movies & TV shows
            - 🌍 Multi-language support (EN, HI, ES, FR)
            - 📺 Full TV series support with season/episode selection
            - 🎨 Premium dark UI with glassmorphism
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
